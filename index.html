<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le mie lezioni · Italiano e Lettura</title>
<meta name="theme-color" content="#E07A5F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --paper:#FAF6EF; --ink:#2B2A26; --line:#E7E0D2; --muted:#8A8576;
    --accent:#E07A5F; --accent2:#EF8A6E; --accentDk:#C45B43;
    --card:#ffffff;
    --shadow:0 14px 34px -16px rgba(43,42,38,.45);
    --shadow-sm:0 6px 18px -10px rgba(43,42,38,.4);
    --display:'Fredoka',system-ui,sans-serif;
    --body:'Nunito',system-ui,sans-serif;
    --radius:20px;
    --scale:1;
  }
  /* ── Tema scuro ── */
  html[data-theme="dark"]{
    --paper:#1d1c1a; --ink:#ECE7DC; --line:#3a3833; --muted:#9c968a;
    --card:#26241f;
    --shadow:0 14px 34px -16px rgba(0,0,0,.7);
    --shadow-sm:0 6px 18px -10px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;color:var(--ink);font-family:var(--body);
    background:
      radial-gradient(900px 500px at 10% -10%, #FFE7D8 0%, transparent 55%),
      radial-gradient(900px 600px at 100% 0%, #E7F3EC 0%, transparent 50%),
      linear-gradient(180deg,#FAF6EF 0%, #F3EEE3 100%);
    background-attachment:fixed;
    min-height:100%;
  }
  html[data-theme="dark"] body{
    background:
      radial-gradient(900px 500px at 10% -10%, #2a211c 0%, transparent 55%),
      radial-gradient(900px 600px at 100% 0%, #16241d 0%, transparent 50%),
      linear-gradient(180deg,#1d1c1a 0%, #161512 100%);
  }
  button{font-family:var(--body);cursor:pointer}

  /* ── Header ── */
  header{
    position:sticky;top:0;z-index:20;
    background:rgba(250,246,239,.82);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  html[data-theme="dark"] header{background:rgba(29,28,26,.85)}
  .wrap{max-width:1040px;margin:0 auto;padding:14px 22px}
  .head-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo{
    width:46px;height:46px;border-radius:14px;display:grid;place-items:center;flex-shrink:0;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:24px;
    box-shadow:0 8px 18px -6px rgba(224,122,95,.7);
  }
  h1{margin:0;font-family:var(--display);font-weight:700;font-size:23px;line-height:1.05;letter-spacing:.2px}
  .sub{margin:3px 0 0;font-size:13px;color:var(--muted);font-weight:600}
  .toolbar{display:flex;gap:9px;flex-wrap:wrap;margin-left:auto}

  main{max-width:1040px;margin:0 auto;padding:28px 22px 90px;zoom:var(--scale,1)}

  /* ── Buttons ── */
  .btn{
    display:inline-flex;align-items:center;gap:8px;border:0;padding:11px 17px;border-radius:13px;
    font-weight:800;font-size:14px;transition:transform .12s ease, box-shadow .18s ease, background .18s ease;
    background:#fff;color:var(--ink);box-shadow:var(--shadow-sm);
  }
  html[data-theme="dark"] .btn{background:var(--card)}
  .btn:hover{transform:translateY(-2px)}
  .btn:active{transform:translateY(0)}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 12px 22px -10px rgba(224,122,95,.85)}
  .btn-ghost{background:rgba(255,255,255,.7);color:var(--ink);box-shadow:none;border:1px solid var(--line)}
  html[data-theme="dark"] .btn-ghost{background:rgba(255,255,255,.06)}
  .btn-ghost:hover{background:#fff;box-shadow:var(--shadow-sm)}
  html[data-theme="dark"] .btn-ghost:hover{background:rgba(255,255,255,.12)}
  .btn-ghost.danger{color:var(--accentDk)}
  .btn-sm{padding:8px 13px;font-size:13px;border-radius:11px}

  /* ── Cards / form ── */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
  .grid{display:grid;gap:18px}
  input,textarea{
    width:100%;padding:12px 15px;border-radius:12px;border:1.5px solid var(--line);
    font-size:15px;font-family:var(--body);background:#FCFAF5;outline:none;color:var(--ink);
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  html[data-theme="dark"] input,html[data-theme="dark"] textarea{background:#201e1a}
  input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(224,122,95,.14)}
  textarea{resize:vertical;line-height:1.55}
  label.field{display:flex;align-items:center;gap:7px;font-weight:800;font-size:13px;margin-bottom:7px}
  .fieldblock{margin-bottom:18px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  /* ── Search ── */
  .search{position:relative;margin-bottom:22px;max-width:480px}
  .search input{padding-left:44px;border-radius:14px;background:#fff;box-shadow:var(--shadow-sm);border-color:transparent}
  html[data-theme="dark"] .search input{background:var(--card)}
  .search span{position:absolute;left:15px;top:12px;color:var(--muted)}
  .section-title{font-family:var(--display);font-weight:600;font-size:18px;margin:26px 0 14px;color:var(--ink)}

  /* ── Lesson list cards ── */
  .lez{display:flex;gap:18px;flex-wrap:wrap}
  .card.lezcard{padding:16px;transition:transform .14s ease, box-shadow .18s ease}
  .card.lezcard:hover{transform:translateY(-3px);box-shadow:0 22px 40px -18px rgba(43,42,38,.5)}
  .thumb{width:172px;flex-shrink:0}
  .thumb img{width:100%;border-radius:14px;display:block;box-shadow:var(--shadow-sm)}
  .thumb .empty{width:100%;aspect-ratio:3/2;border-radius:14px;border:2px dashed var(--line);display:grid;place-items:center;color:var(--muted);font-size:12px;text-align:center;padding:8px;background:#FCFAF5}
  html[data-theme="dark"] .thumb .empty{background:#201e1a}
  .lez-body{flex:1;min-width:230px}
  .lez-body h3{font-family:var(--display);font-size:21px;margin:0 0 4px;font-weight:600}
  .concetto{margin:0 0 12px;color:var(--accentDk);font-weight:800;font-size:14px}
  .pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:800;background:var(--line);color:var(--ink)}
  .pill.mint{background:#CFF0DC;color:#0c6e43}
  .pill.amber{background:#FCE9B6;color:#92600b}
  .pill.indigo{background:#DCE0FB;color:#3b3da8}
  .pill.tag{background:#EDE9FE;color:#5b21b6}
  .stat{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:999px;font-size:13px;font-weight:800;background:var(--line);color:var(--ink)}

  .imgpick{display:flex;gap:10px;flex-wrap:wrap}
  .ord{display:inline-flex;gap:4px;margin-left:auto}

  /* ── Gallery (immagini multiple) ── */
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-top:18px}
  .gallery img{width:100%;border-radius:14px;box-shadow:var(--shadow-sm);object-fit:cover;aspect-ratio:4/3;display:block}
  .gallery-edit{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px}
  .gallery-edit .gi{position:relative;width:120px}
  .gallery-edit .gi img{width:100%;border-radius:12px;box-shadow:var(--shadow-sm);display:block;aspect-ratio:4/3;object-fit:cover}
  .gallery-edit .gi-x{position:absolute;top:-8px;right:-8px;width:26px;height:26px;border-radius:50%;border:0;background:var(--accentDk);color:#fff;font-weight:900;box-shadow:var(--shadow-sm);font-size:13px}

  /* ── Drive ── */
  .drivechip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:800;color:#0c6e43;background:#CFF0DC;padding:7px 11px;border-radius:11px}
  .iconbtn{padding:8px 11px;font-size:14px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-weight:800;font-size:14px;padding:12px 20px;border-radius:14px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;z-index:50;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--accentDk)}

  .empty-state{text-align:center;margin-top:48px;padding:54px 22px;border:2px dashed var(--line);border-radius:24px;background:rgba(255,255,255,.6)}
  html[data-theme="dark"] .empty-state{background:rgba(255,255,255,.04)}

  .hidden{display:none}
  .no-print{}

  /* ── Timer in classe ── */
  .timerbox{position:fixed;right:18px;bottom:18px;z-index:60;background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:14px 16px;text-align:center;min-width:160px}
  .timerbox .t-disp{font-family:var(--display);font-weight:700;font-size:40px;line-height:1;color:var(--ink)}
  .timerbox .t-disp.warn{color:var(--accentDk);animation:tpulse .6s infinite alternate}
  @keyframes tpulse{to{opacity:.45}}
  .timerbox .t-row{display:flex;gap:6px;justify-content:center;margin-top:10px}
  .timerbox .t-row button{border:0;background:var(--line);color:var(--ink);border-radius:9px;padding:7px 9px;font-weight:800;font-size:13px;cursor:pointer}
  .timerbox .t-row button:hover{background:var(--accent);color:#fff}

  /* ── Slide presentation ── */
  .stage-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .stage-top .grow{flex:1 1 auto}
  .savedchip{font-size:13px;font-weight:800;color:#0c6e43;opacity:0;transition:opacity .3s ease}
  .savedchip.show{opacity:1}
  .stage{position:relative}
  .slide{
    position:relative;border-radius:26px;padding:clamp(26px,5vw,56px);
    min-height:min(64vh,560px);display:flex;flex-direction:column;
    box-shadow:var(--shadow);overflow:hidden;
    animation:slidein .35s cubic-bezier(.2,.7,.2,1);
  }
  @keyframes slidein{from{opacity:0;transform:translateY(14px) scale(.99)}to{opacity:1;transform:none}}
  .slide::after{content:"";position:absolute;inset:0;border-radius:26px;border:1px solid rgba(255,255,255,.5);pointer-events:none}
  .slide .kicker{display:inline-flex;align-items:center;gap:10px;font-weight:900;font-size:14px;letter-spacing:.4px;text-transform:uppercase;opacity:.85}
  .slide .kicker .ico{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:22px;background:rgba(255,255,255,.6)}
  .slide h2{font-family:var(--display);font-weight:700;font-size:clamp(28px,5vw,46px);margin:14px 0 6px;line-height:1.08}
  .slide .lead{font-size:clamp(17px,2.4vw,22px);font-weight:800;margin:0}
  .slide .content{margin-top:auto}
  .points{list-style:none;margin:18px 0 0;padding:0;display:grid;gap:14px}
  .points li{display:flex;gap:13px;align-items:flex-start;font-size:clamp(16px,2.2vw,21px);font-weight:700;line-height:1.4}
  .points li .dot{flex-shrink:0;width:28px;height:28px;border-radius:9px;display:grid;place-items:center;font-size:15px;color:#fff;font-weight:900;margin-top:1px}
  .slide .cover-img{margin-top:22px;max-width:min(100%,420px);border-radius:18px;box-shadow:var(--shadow);display:block}
  .slide .num{position:absolute;top:22px;right:26px;font-weight:900;font-size:14px;opacity:.55}
  .slide *{color:#2B2A26}

  /* slide themes (soft pastel gradients, dark ink) */
  .t-cover{background:linear-gradient(135deg,#FFE8D6,#FFCBB0)}
  .t-cover .dot,.t-cover .kicker .ico{background:linear-gradient(135deg,#E07A5F,#EF8A6E)}
  .t-obj{background:linear-gradient(135deg,#FFF3C4,#FCE08A)}
  .t-obj .dot{background:#D97706}
  .t-online{background:linear-gradient(135deg,#D6F5E3,#A7F3D0)}
  .t-online .dot{background:#059669}
  .t-vivo{background:linear-gradient(135deg,#E4E9FF,#C7D2FE)}
  .t-vivo .dot{background:#4F46E5}
  .t-mat{background:linear-gradient(135deg,#FCE3F0,#FBCFE8)}
  .t-mat .dot{background:#DB2777}
  .t-compiti{background:linear-gradient(135deg,#FFE0CC,#FFD0B0)}
  .t-compiti .dot{background:#C2410C}
  .t-verifica{background:linear-gradient(135deg,#D9F0E4,#B6E7CC)}
  .t-verifica .dot{background:#047857}

  /* inline editing on slides */
  .edit-on [contenteditable]{outline:none;border-radius:10px;transition:background .15s, box-shadow .15s}
  .edit-on [contenteditable]:hover{background:rgba(255,255,255,.45)}
  .edit-on [contenteditable]:focus{background:rgba(255,255,255,.8);box-shadow:0 0 0 3px rgba(43,42,38,.12)}
  [contenteditable]{padding:2px 6px;margin:-2px -6px}
  .edit-on .points li .dot{cursor:default}
  .edit-hint{font-size:13px;font-weight:700;color:var(--muted);background:rgba(255,255,255,.7);padding:6px 12px;border-radius:999px}
  .slide .addrow{margin-top:16px}
  .slide .addrow .btn{background:rgba(255,255,255,.7)}

  /* slide controls */
  .controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:18px}
  .nav-btn{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-size:20px;background:#fff;box-shadow:var(--shadow-sm);border:0}
  html[data-theme="dark"] .nav-btn{background:var(--card);color:var(--ink)}
  .nav-btn:disabled{opacity:.35;cursor:default;transform:none}
  .dots{display:flex;gap:8px}
  .dots .d{width:10px;height:10px;border-radius:50%;background:var(--line);border:0;padding:0;transition:transform .15s, background .15s}
  .dots .d.active{background:var(--accent);transform:scale(1.35)}

  /* fullscreen presentation */
  .stage:fullscreen{background:var(--paper);padding:24px;display:flex;align-items:center;justify-content:center}
  .stage:-webkit-full-screen{background:var(--paper);padding:24px;display:flex;align-items:center;justify-content:center}
  .stage:fullscreen .slide{width:100%;min-height:90vh}
  .stage:-webkit-full-screen .slide{width:100%;min-height:90vh}

  @media(max-width:560px){
    .two{grid-template-columns:1fr}
    .toolbar{width:100%}
    .toolbar .btn{flex:1}
  }

  /* ── Print: tutte le slide impilate ── */
  @media print{
    header,.no-print,.controls,.stage-top,.timerbox{display:none!important}
    body{background:#fff}
    main{padding:0;max-width:none;zoom:1}
    .slide{box-shadow:none;page-break-after:always;min-height:auto;border:1px solid #ddd;margin-bottom:12px;animation:none}
    .printall .slide{display:flex!important}
  }
</style>
</head>
<body>
<header>
  <div class="wrap head-row">
    <div class="logo">📖</div>
    <div style="flex:1 1 auto">
      <h1>Le mie lezioni</h1>
      <p class="sub">Italiano e Lettura · scuola primaria</p>
    </div>
    <div class="toolbar no-print" id="toolbar"></div>
  </div>
</header>

<main id="app"></main>

<input type="file" id="fileComic" accept="image/*" class="hidden">
<input type="file" id="fileCamera" accept="image/*" capture="environment" class="hidden">
<input type="file" id="fileBackup" accept="application/json,.json" class="hidden">

<div class="timerbox hidden no-print" id="timerbox"></div>
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = "lezioni-italiano-v1";
const PREF_KEY = "lezioni-pref-v1";

/* ⚙️ CONFIGURAZIONE GOOGLE DRIVE
   Incolla qui il tuo OAuth Client ID (tipo "1234-abcd.apps.googleusercontent.com").
   Finché resta vuoto, i pulsanti Drive mostrano le istruzioni. */
const GOOGLE_CLIENT_ID = "182315572999-kslekgg21jq5lbdp5tkkebdqp3elp5ok.apps.googleusercontent.com";
const DRIVE_FOLDER = "Lezioni Scuola";
const DRIVE_FILE = "lezioni-backup.json";
const EMPTY = () => ({id:null,titolo:"",concetto:"",fumetto:"",immagini:[],obiettivi:"",online:"",vivo:"",materiali:"",compiti:"",verifica:"",tags:"",durata:""});
const EMPTY_CORSO = () => ({id:null,titolo:"",descrizione:"",lezioni:[]});

let corsi = [];          // sovrastruttura: ogni corso contiene le sue lezioni
let currentCorsoId = null;
let view = "corsi";      // corsi | corso | editCorso | edit | slide
let draft = EMPTY();         // bozza lezione
let draftCorso = EMPTY_CORSO(); // bozza corso
let query = "";
let slideIndex = 0;
let editMode = false;    // modifica inline nelle slide

/* preferenze utente (tema, dimensione testo, auto-sync) */
let pref = {theme:"light", scale:1, autoSync:false};

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw){ corsi = []; }
    else {
      const data = JSON.parse(raw);
      if(Array.isArray(data)){
        // formato vecchio (solo lezioni) → migra dentro un corso predefinito
        corsi = data.length ? [{id:Date.now(), titolo:"Le mie lezioni", descrizione:"", lezioni:data}] : [];
      } else if(data && Array.isArray(data.corsi)){
        corsi = data.corsi;
      } else {
        corsi = [];
      }
    }
  }
  catch(e){ corsi = []; }
  normalizeAll();
}
function normLez(l){
  if(!l) return l;
  if(!Array.isArray(l.immagini)) l.immagini = l.fumetto ? [l.fumetto] : [];
  if(l.fumetto && !l.immagini.includes(l.fumetto)) l.immagini.unshift(l.fumetto);
  ["titolo","concetto","obiettivi","online","vivo","materiali","compiti","verifica","tags","durata"].forEach(k=>{ if(l[k]==null) l[k]=""; });
  l.fumetto = l.immagini[0] || "";
  return l;
}
function normalizeAll(){
  corsi.forEach(c=>{ if(!Array.isArray(c.lezioni)) c.lezioni=[]; c.lezioni.forEach(normLez); });
}
function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({corsi}));
  }catch(e){
    toast("⚠️ Spazio del browser esaurito. Esporta un backup e rimuovi qualche immagine.", true);
    return;
  }
  if(driveOn && pref.autoSync) scheduleSync();
}
function corsoCorrente(){ return corsi.find(c=>c.id===currentCorsoId) || null; }
function lezioniCorrenti(){ const c=corsoCorrente(); return c ? (c.lezioni||(c.lezioni=[])) : []; }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function lines(s){ return (s||"").split("\n").map(x=>x.replace(/^[\s•\-–·]+/,"").trim()).filter(Boolean); }
function tagList(s){ return (s||"").split(",").map(x=>x.trim()).filter(Boolean); }
function parseMinutes(s){ const m=(s||"").match(/\d+/); return m?parseInt(m[0],10):0; }

const app = document.getElementById("app");

function render(){
  if(view==="corsi") renderCorsi();
  else if(view==="corso") renderCorso();
  else if(view==="editCorso") renderEditorCorso();
  else if(view==="edit") renderEditor();
  else renderSlides();
}

/* ───────────────────────── CORSI (home) ───────────────────────── */
function renderCorsi(){
  if(corsi.length===0){
    app.innerHTML = `
      <div class="empty-state">
        <div style="font-size:50px;margin-bottom:10px">🎓</div>
        <h2 style="font-family:var(--display);font-weight:600;margin:0 0 6px">Ancora nessun corso</h2>
        <p style="color:var(--muted);margin:0 0 20px">Crea il primo corso: raccoglierà al suo interno tutte le lezioni.</p>
        <button class="btn btn-primary" onclick="nuovoCorso()">＋ Crea il primo corso</button>
      </div>`;
    return;
  }
  const ql = query.toLowerCase();
  const filt = corsi.filter(c =>
    (c.titolo||"").toLowerCase().includes(ql) ||
    (c.descrizione||"").toLowerCase().includes(ql));

  // Ricerca globale: lezioni che corrispondono in tutti i corsi
  let lezMatches = [];
  if(ql){
    corsi.forEach(c=>(c.lezioni||[]).forEach(l=>{
      if((l.titolo||"").toLowerCase().includes(ql) ||
         (l.concetto||"").toLowerCase().includes(ql) ||
         (l.tags||"").toLowerCase().includes(ql))
        lezMatches.push({c, l});
    }));
  }

  app.innerHTML = `
    <div class="search no-print">
      <span>🔍</span>
      <input id="q" placeholder="Cerca corsi e lezioni…" value="${esc(query)}">
    </div>
    <div class="grid">
      ${filt.map((c,i)=>corsoCardHTML(c,i)).join("") || `<p style="color:var(--muted)">Nessun corso trovato.</p>`}
    </div>
    ${lezMatches.length ? `
      <h3 class="section-title">📚 Lezioni trovate (${lezMatches.length})</h3>
      <div class="grid">
        ${lezMatches.map(m=>lezMatchHTML(m.c,m.l)).join("")}
      </div>` : ""}`;

  const q = document.getElementById("q");
  q.addEventListener("input", e => { query = e.target.value; const p=q.selectionStart; renderCorsi(); const nq=document.getElementById("q"); nq.focus(); nq.setSelectionRange(p,p); });
}

function corsoCardHTML(c,i){
  const n = (c.lezioni||[]).length;

/* ───────────────────────── CORSO (dettaglio + lezioni) ───────────────────────── */
function renderCorso(){
  const c = corsoCorrente();
  if(!c){ view="corsi"; renderCorsi(); return; }
  const lez = c.lezioni||[];
  const ql = query.toLowerCase();
  const filt = lez.filter(l =>
    (l.titolo||"").toLowerCase().includes(ql) ||
    (l.concetto||"").toLowerCase().includes(ql) ||
    (l.tags||"").toLowerCase().includes(ql));

  // statistiche corso
  const tot = lez.reduce((a,l)=>a+parseMinutes(l.durata),0);
  const mats = [...new Set(lez.flatMap(l=>(l.materiali||"").split(/[\n,]/).map(x=>x.trim()).filter(Boolean)))];

  app.innerHTML = `
    <button class="btn btn-ghost btn-sm no-print" onclick="tornaCorsi()" style="margin-bottom:16px">‹ Tutti i corsi</button>
    <div class="card" style="margin-bottom:22px">
      <h2 style="font-family:var(--display);font-weight:700;font-size:26px;margin:0 0 8px">🎓 ${esc(c.titolo)}</h2>
      ${c.descrizione
        ? `<p style="margin:0 0 14px;color:var(--ink);font-size:16px;line-height:1.55;font-weight:600">${esc(c.descrizione)}</p>`
        : `<p style="margin:0 0 14px;color:var(--muted);font-style:italic">Questo corso non ha ancora una descrizione dello scopo. <button class="btn btn-ghost btn-sm" onclick="modificaCorso(${c.id})">✏️ Aggiungi descrizione</button></p>`}
      <div class="pills">
        <span class="stat">📚 ${lez.length} ${lez.length===1?"lezione":"lezioni"}</span>
        <span class="stat">⏱️ ${tot} min totali</span>
        <span class="stat">🎒 ${mats.length} ${mats.length===1?"materiale":"materiali"}</span>
      </div>
      <div class="actions no-print" style="margin-top:16px">
        <button class="btn btn-primary btn-sm" onclick="nuova()">＋ Nuova lezione</button>
        <button class="btn btn-ghost btn-sm" onclick="modificaCorso(${c.id})">✏️ Modifica corso</button>
      </div>
    </div>
    ${lez.length===0
      ? `<div class="empty-state">
           <div style="font-size:50px;margin-bottom:10px">📚</div>
           <h2 style="font-family:var(--display);font-weight:600;margin:0 0 6px">Ancora nessuna lezione</h2>
           <p style="color:var(--muted);margin:0 0 20px">Aggiungi la prima lezione di questo corso: potrai vederla come una presentazione a slide.</p>
           <button class="btn btn-primary" onclick="nuova()">＋ Crea la prima lezione</button>
         </div>`
      : `<div class="search no-print">
           <span>🔍</span>
           <input id="q" placeholder="Cerca per titolo, concetto o tag…" value="${esc(query)}">
         </div>
         <div class="grid">
           ${filt.map((l)=>cardHTML(l, lez.indexOf(l), lez.length)).join("") || `<p style="color:var(--muted)">Nessuna lezione trovata.</p>`}
         </div>`}`;

  const q = document.getElementById("q");
  if(q) q.addEventListener("input", e => { query = e.target.value; const p=q.selectionStart; renderCorso(); const nq=document.getElementById("q"); if(nq){ nq.focus(); nq.setSelectionRange(p,p); } });
}

/* ───────────────────────── SLIDE / PRESENTAZIONE ───────────────────────── */
function buildSlides(){
  const s = [{type:"cover", theme:"t-cover", ico:"📖", kicker:"Lezione"}];
  if((draft.immagini||[]).length>1)
    s.push({type:"gallery", theme:"t-cover", ico:"🖼️", kicker:"Immagini", title:"Immagini della lezione"});
  const secs = [
    {key:"obiettivi", theme:"t-obj",      ico:"🎯", kicker:"Obiettivi", title:"Obiettivi didattici"},
    {key:"online",    theme:"t-online",   ico:"💻", kicker:"Online",    title:"Attività online"},
    {key:"vivo",      theme:"t-vivo",     ico:"👥", kicker:"In classe", title:"Attività in presenza"},
    {key:"mat",       theme:"t-mat",      ico:"🎒", kicker:"Materiali", title:"Materiali e durata"},
    {key:"compiti",   theme:"t-compiti",  ico:"📝", kicker:"Compiti",   title:"Compiti a casa"},
    {key:"verifica",  theme:"t-verifica", ico:"✅", kicker:"Verifica",  title:"Verifica e valutazione"},
  ];
  secs.forEach(sec=>{
    const has = sec.key==="mat" ? (draft.materiali||draft.durata) : draft[sec.key];
    if(editMode || has) s.push({type:"section", ...sec});
  });
  return s;
}

function renderSlides(){
  const slides = buildSlides();
  if(slideIndex>=slides.length) slideIndex = slides.length-1;
  if(slideIndex<0) slideIndex = 0;
  const s = slides[slideIndex];

  app.innerHTML = `
    <div class="stage-top no-print">
      <button class="btn btn-ghost btn-sm" onclick="annulla()">‹ Lezioni</button>
      <span class="grow"></span>
      <span class="savedchip" id="savedchip">✓ Salvato</span>
      <button class="btn btn-ghost btn-sm" onclick="timerShow()" title="Timer in classe">⏱️ Timer</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleFullscreen()" title="Schermo intero (F)">⛶</button>
      <button class="btn ${editMode?'btn-primary':'btn-ghost'} btn-sm" onclick="toggleEdit()">
        ${editMode?'✅ Fine modifica':'✏️ Abilita modifica'}
      </button>
      <button class="btn btn-ghost btn-sm" onclick="modifica(${draft.id})">🗂️ Scheda</button>
      <button class="btn btn-ghost btn-sm" onclick="stampaTutto()">🖨️ Stampa / PDF</button>
    </div>
    <div class="stage ${editMode?'edit-on':''}">
      <div class="slide ${s.theme}" id="slide">
        <span class="num">${slideIndex+1} / ${slides.length}</span>
        ${slideInner(s)}
      </div>
    </div>
    <div class="controls no-print">
      <button class="nav-btn" id="prev" ${slideIndex===0?'disabled':''}>‹</button>
      <div class="dots">
        ${slides.map((_,i)=>`<button class="d ${i===slideIndex?'active':''}" onclick="goTo(${i})" aria-label="Slide ${i+1}"></button>`).join("")}
      </div>
      <button class="nav-btn" id="next" ${slideIndex===slides.length-1?'disabled':''}>›</button>
    </div>
    ${editMode?`<p class="no-print" style="text-align:center;color:var(--muted);font-weight:700;font-size:13px;margin-top:12px">Tocca un testo per modificarlo · le modifiche si salvano da sole</p>`:""}`;

  const prev=document.getElementById("prev"), next=document.getElementById("next");
  if(prev) prev.onclick=()=>goTo(slideIndex-1);
  if(next) next.onclick=()=>goTo(slideIndex+1);

  if(editMode) wireEditable(s);
}

function slideInner(s){
  if(s.type==="cover"){
    return `
      <div class="kicker"><span class="ico">${s.ico}</span> ${s.kicker}</div>
      <h2 ${editAttr("titolo")} data-ph="Titolo della lezione">${esc(draft.titolo)||(editMode?'':'Senza titolo')}</h2>
      <p class="lead" ${editAttr("concetto")} data-ph="Concetto chiave" style="color:var(--accentDk)">${esc(draft.concetto)}</p>
      <div class="content">
        <div class="pills" style="margin-top:18px">
          ${draft.durata?`<span class="pill">⏱️ ${esc(draft.durata)}</span>`:""}
          ${draft.online?`<span class="pill mint">💻 Online</span>`:""}
          ${draft.vivo?`<span class="pill amber">👥 In presenza</span>`:""}
          ${tagList(draft.tags).map(t=>`<span class="pill tag">#${esc(t)}</span>`).join("")}
        </div>
        ${draft.fumetto
          ? `<img class="cover-img" src="${draft.fumetto}" alt="Immagine della lezione">`
          : (editMode?`<div class="addrow"><button class="btn btn-sm" onclick="document.getElementById('fileComic').click()">🖼️ Aggiungi immagine</button> <button class="btn btn-sm" onclick="document.getElementById('fileCamera').click()">📷 Scatta foto</button></div>`:"")}
      </div>`;
  }
  if(s.type==="gallery"){
    return `
      <div class="kicker"><span class="ico">${s.ico}</span> ${s.kicker}</div>
      <h2>${esc(s.title)}</h2>
      <div class="content">
        <div class="gallery">${(draft.immagini||[]).map(src=>`<img src="${src}" alt="Immagine">`).join("")}</div>
        ${editMode?`<div class="addrow"><button class="btn btn-sm" onclick="document.getElementById('fileComic').click()">🖼️ Aggiungi</button> <button class="btn btn-sm" onclick="document.getElementById('fileCamera').click()">📷 Scatta</button></div>`:""}
      </div>`;
  }
  // section
  const txt = s.key==="mat" ? draft.materiali : draft[s.key];
  const pts = lines(txt);
  let body;
  if(editMode){
    body = `
      <ul class="points" id="pts">
        ${(pts.length?pts:[""]).map((p,i)=>pointEdit(s.key,i,p)).join("")}
      </ul>
      <div class="addrow"><button class="btn btn-sm" onclick="addPoint('${s.key}')">＋ Aggiungi punto</button></div>
      ${s.key==="mat"?durataEdit():""}`;
  } else {
    body = `
      <ul class="points">
        ${pts.map((p,i)=>`<li><span class="dot">${i+1}</span><span>${esc(p)}</span></li>`).join("")}
      </ul>
      ${(s.key==="mat"&&draft.durata)?`<div class="pills" style="margin-top:18px"><span class="pill">⏱️ ${esc(draft.durata)}</span></div>`:""}`;
  }
  return `
    <div class="kicker"><span class="ico">${s.ico}</span> ${s.kicker}</div>
    <h2>${esc(s.title)}</h2>
    <div class="content">${body}</div>`;
}

function pointEdit(key,i,val){
  return `<li><span class="dot">${i+1}</span><span class="pt" contenteditable data-key="${key}" data-i="${i}" data-ph="Scrivi un punto…">${esc(val)}</span></li>`;
}
function durataEdit(){
  return `<div class="addrow"><label style="font-weight:800;font-size:14px">⏱️ Durata:
    <span contenteditable class="dur" data-ph="es. 45 min" style="background:rgba(255,255,255,.6);border-radius:8px;padding:3px 10px;margin-left:6px;display:inline-block;min-width:90px">${esc(draft.durata)}</span>
  </label></div>`;
}
function editAttr(key){ return editMode?`contenteditable data-key="${key}"`:""; }

function wireEditable(s){
  // titolo / concetto (cover)
  app.querySelectorAll('[contenteditable][data-key]').forEach(el=>{
    el.addEventListener("input", ()=>{
      draft[el.dataset.key] = el.innerText.trim();
      persist();
    });
  });
  // punti multilinea -> ricompone il testo
  const collectPts = ()=>{
    if(s.type!=="section") return;
    const field = s.key==="mat" ? "materiali" : s.key;
    const vals = [...app.querySelectorAll('.pt')].map(e=>e.innerText.trim()).filter(Boolean);
    draft[field] = vals.join("\n");
    persist();
  };
  app.querySelectorAll('.pt').forEach(el=> el.addEventListener("input", collectPts));
  const dur = app.querySelector('.dur');
  if(dur) dur.addEventListener("input", ()=>{ draft.durata = dur.innerText.trim(); persist(); });

  // placeholder visivo per contenteditable vuoti
  app.querySelectorAll('[contenteditable]').forEach(el=>{
    const ph = el.dataset.ph||"";
    const upd=()=>{ if(!el.innerText.trim()){ el.classList.add('is-empty'); } else el.classList.remove('is-empty'); };
    el.dataset._ph=ph; upd(); el.addEventListener("input",upd);
  });
}

function addPoint(key){
  const field = key==="mat" ? "materiali" : key;
  draft[field] = (draft[field] ? draft[field]+"\n" : "");
  persist(); renderSlides();
  const pts = app.querySelectorAll('.pt'); if(pts.length) pts[pts.length-1].focus();
}

function persist(){
  if(!draft.titolo.trim() && !draft.id) return;
  upsert();
  const chip = document.getElementById("savedchip");
  if(chip){ chip.classList.add("show"); clearTimeout(persist._t); persist._t=setTimeout(()=>chip.classList.remove("show"),1100); }
}
function upsert(){
  const c = corsoCorrente(); if(!c) return;
  if(!c.lezioni) c.lezioni = [];
  if(draft.id==null) draft.id = Date.now();
  draft.fumetto = (draft.immagini&&draft.immagini[0]) || "";
  const i = c.lezioni.findIndex(l=>l.id===draft.id);
  if(i>=0) c.lezioni[i]=JSON.parse(JSON.stringify(draft)); else c.lezioni.push(JSON.parse(JSON.stringify(draft)));
  save();
}

function goTo(i){
  const n = buildSlides().length;
  slideIndex = Math.max(0, Math.min(n-1, i));
  renderSlides();
}
function toggleEdit(){ editMode = !editMode; renderSlides(); }

function toggleFullscreen(){
  const el = document.querySelector('.stage');
  if(!el) return;
  if(!document.fullscreenElement && !document.webkitFullscreenElement){
    (el.requestFullscreen || el.webkitRequestFullscreen || (()=>{})).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || (()=>{})).call(document);
  }
}

function stampaTutto(){
  // mostra tutte le slide in stampa
  const slides = buildSlides();
  const wasEdit = editMode, wasIdx = slideIndex; editMode=false;
  let html="";
  slides.forEach((s,idx)=>{ slideIndex=idx; html+=`<div class="slide ${s.theme}"><span class="num">${idx+1} / ${slides.length}</span>${slideInner(s)}</div>`; });
  const stage = document.createElement("div");
  stage.className="printall"; stage.id="printstage"; stage.innerHTML=html;
  app.appendChild(stage);
  window.print();
  stage.remove();
  editMode=wasEdit; slideIndex=wasIdx; renderSlides();
}

/* ───────────────────────── TIMER IN CLASSE ───────────────────────── */
let timer = {sec:0, run:false, int:null};
function timerFmt(s){ const m=Math.floor(s/60), x=s%60; return m+":"+String(x).padStart(2,"0"); }
function timerRender(){
  const b = document.getElementById("timerbox"); if(!b) return;
  b.innerHTML = `
    <div class="t-disp ${(timer.sec<=10&&timer.sec>0)?'warn':''}">${timerFmt(timer.sec)}</div>
    <div class="t-row">
      <button onclick="timerAdj(-60)" title="-1 minuto">−1′</button>
      <button onclick="timerToggle()" title="Avvia/Pausa">${timer.run?'⏸':'▶️'}</button>
      <button onclick="timerAdj(60)" title="+1 minuto">+1′</button>
      <button onclick="timerReset()" title="Azzera">↺</button>
      <button onclick="timerHide()" title="Chiudi">✕</button>
    </div>`;
}
function timerShow(){
  const b = document.getElementById("timerbox"); b.classList.remove("hidden");
  if(timer.sec===0) timer.sec = (parseMinutes(draft.durata)||5)*60;
  timerRender();
}
function timerHide(){ timerStop(); document.getElementById("timerbox").classList.add("hidden"); }
function timerToggle(){ timer.run ? timerStop() : timerStart(); }
function timerStart(){
  if(timer.sec<=0) return;
  timer.run=true;
  timer.int=setInterval(()=>{
    timer.sec--;
    if(timer.sec<=0){ timer.sec=0; timerStop(); timerDing(); }
    timerRender();
  },1000);
  timerRender();
}
function timerStop(){ timer.run=false; clearInterval(timer.int); timer.int=null; timerRender(); }
function timerReset(){ timerStop(); timer.sec=(parseMinutes(draft.durata)||5)*60; timerRender(); }
function timerAdj(d){ timer.sec=Math.max(0, timer.sec+d); timerRender(); }
function timerDing(){
  try{
    const a=new (window.AudioContext||window.webkitAudioContext)();
    const o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination); o.frequency.value=880; g.gain.value=.12;
    o.start(); setTimeout(()=>{o.stop(); a.close();},600);
  }catch(e){}
}

/* ───────────────────────── AZIONI CORSO ───────────────────────── */
function nuovoCorso(){ draftCorso = EMPTY_CORSO(); draftCorso.id = Date.now(); view="editCorso"; render(); }
function modificaCorso(id){ draftCorso = JSON.parse(JSON.stringify(corsi.find(c=>c.id===id))); view="editCorso"; render(); }
function apriCorso(id){ currentCorsoId = id; view="corso"; query=""; render(); }
function tornaCorsi(){ view="corsi"; currentCorsoId=null; query=""; render(); }
function annullaCorso(){
  // se il corso è già salvato torna al suo dettaglio, altrimenti alla lista corsi
  if(draftCorso.id!=null && corsi.some(c=>c.id===draftCorso.id)){ currentCorsoId=draftCorso.id; view="corso"; }
  else view="corsi";
  query=""; render();
}
function upsertCorso(){
  if(draftCorso.id==null) draftCorso.id = Date.now();
  if(!draftCorso.lezioni) draftCorso.lezioni = [];
  const i = corsi.findIndex(c=>c.id===draftCorso.id);
  if(i>=0){ // preserva le lezioni esistenti
    draftCorso.lezioni = corsi[i].lezioni || [];
    corsi[i] = JSON.parse(JSON.stringify(draftCorso));
  } else corsi.push(JSON.parse(JSON.stringify(draftCorso)));
  save();
}
function salvaCorso(){
  if(!draftCorso.titolo.trim()){ alert("Dai un titolo al corso prima di salvare."); return; }
  upsertCorso();
  currentCorsoId = draftCorso.id; view="corso"; query=""; render();
}
function eliminaCorso(id){
  const c = corsi.find(x=>x.id===id); const n = c ? (c.lezioni||[]).length : 0;
  if(!confirm(`Eliminare il corso "${c?c.titolo:""}"${n?` e le sue ${n} lezioni`:""}? L'azione non è reversibile.`)) return;
  corsi = corsi.filter(x=>x.id!==id); save();
  if(currentCorsoId===id){ currentCorsoId=null; view="corsi"; }
  render();
}
function spostaCorso(id,dir){
  const i = corsi.findIndex(c=>c.id===id), j = i+dir;
  if(i<0 || j<0 || j>=corsi.length) return;
  [corsi[i],corsi[j]] = [corsi[j],corsi[i]];
  save(); renderCorsi();
}
function duplicaCorso(id){
  const i = corsi.findIndex(c=>c.id===id); if(i<0) return;
  const copy = JSON.parse(JSON.stringify(corsi[i]));
  copy.id = Date.now();
  copy.titolo = (copy.titolo||"Corso") + " (copia)";
  (copy.lezioni||[]).forEach((l,k)=>{ l.id = Date.now()+k+1; });
  corsi.splice(i+1, 0, copy);
  save(); renderCorsi();
  toast("Corso duplicato ✓");
}

/* ── Compressione immagini (riduce dimensione e salva spazio) ── */
function compressImage(dataURL){
  return new Promise(res=>{
    const img = new Image();
    img.onload = ()=>{
      const max = 1280;
      let w = img.width, h = img.height;
      if(w>max || h>max){ if(w>=h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      const c = document.createElement("canvas");
      c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      try{ res(c.toDataURL("image/jpeg",0.82)); }
      catch(e){ res(dataURL); }
    };
    img.onerror = ()=>res(dataURL);
    img.src = dataURL;
  });
}

/* ── Caricamento immagine (galleria o fotocamera) ── */
function caricaImmagine(e){
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = async ()=>{
    const compressed = await compressImage(r.result);
    if(!Array.isArray(draft.immagini)) draft.immagini = [];
    draft.immagini.push(compressed);
    draft.fumetto = draft.immagini[0];
    if(view==="edit") renderImagesArea();
    else { persist(); renderSlides(); }
  };
  r.readAsDataURL(file);
  e.target.value="";
}
document.getElementById("fileComic").addEventListener("change", caricaImmagine);
document.getElementById("fileCamera").addEventListener("change", caricaImmagine);

/* ── Toast ── */
function toast(msg, isErr){
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show" + (isErr?" err":"");
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.className="toast", 2800);
}

/* ── Unione dati importati (da file o da Drive) ── */
function applyImported(data, sorgente){
  // normalizza in lista di corsi (accetta sia il nuovo formato {corsi:[]} sia il vecchio array di lezioni)
  let nuoviCorsi;
  if(Array.isArray(data)){
    nuoviCorsi = data.length ? [{id:Date.now(), titolo:"Lezioni importate", descrizione:"", lezioni:data}] : [];
  } else if(data && Array.isArray(data.corsi)){
    nuoviCorsi = data.corsi;
  } else { toast("Backup non valido.", true); return; }

  if(corsi.length){
    const unisci = confirm(
      `Il backup ${sorgente} contiene ${nuoviCorsi.length} corsi.\n\n`+
      `• OK = UNISCI: aggiunge/aggiorna senza cancellare i ${corsi.length} corsi attuali\n`+
      `• Annulla = SOSTITUISCI tutto con il backup`);
    if(unisci){
      nuoviCorsi.forEach(nc=>{
        if(nc.id==null) nc.id = Date.now()+Math.floor(Math.random()*1000);
        if(!nc.lezioni) nc.lezioni = [];
        const i = corsi.findIndex(c=>c.id===nc.id);
        if(i>=0) corsi[i]=nc; else corsi.push(nc);
      });
    } else {
      if(!confirm("Confermi di SOSTITUIRE tutti i corsi attuali?")) return;
      corsi = nuoviCorsi;
    }
  } else {
    corsi = nuoviCorsi;
  }
  normalizeAll();
  save(); view="corsi"; currentCorsoId=null; query=""; render();
  toast("Corsi importati ✓");
}

/* ── Backup / Ripristino su FILE locale ── */
function exportFile(){
  if(!corsi.length){ toast("Nessun corso da salvare.", true); return; }
  const blob = new Blob([JSON.stringify({corsi},null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const d = new Date(), p = n=>String(n).padStart(2,"0");
  a.download = `lezioni-backup-${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}
document.getElementById("fileBackup").addEventListener("change", e=>{
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = ()=>{ try{ applyImported(JSON.parse(r.result), "del file"); }catch(err){ toast("Il file non è un backup valido.", true); } };
  r.readAsText(file);
  e.target.value="";
});

/* ──────────────── GOOGLE DRIVE ──────────────── */
let driveToken = null, driveExp = 0, driveClient = null, driveOn = false;
let _syncT = null;

function driveConfigurato(){ return !!GOOGLE_CLIENT_ID; }
function scheduleSync(){ clearTimeout(_syncT); _syncT = setTimeout(()=>driveSave(true), 4000); }
function toggleAutoSync(){
  pref.autoSync = !pref.autoSync; savePref(); renderToolbar();
  if(pref.autoSync){
    if(driveOn){ toast("Salvataggio automatico su Drive attivo ✓"); scheduleSync(); }
    else withDrive(()=>{ toast("Salvataggio automatico su Drive attivo ✓"); scheduleSync(); });
  } else toast("Salvataggio automatico disattivato");
}

function avvisoConfig(){
  alert(
    "Google Drive non è ancora configurato.\n\n"+
    "1) Crea un OAuth Client ID (tipo Web) su https://console.cloud.google.com/apis/credentials\n"+
    "2) Aggiungi l'indirizzo del sito tra le \"Origini JavaScript autorizzate\"\n"+
    "3) Incolla il Client ID nella costante GOOGLE_CLIENT_ID dentro index.html\n\n"+
    "Nota: il login Google funziona solo se la pagina è aperta da un indirizzo https, non come file locale.");
}

function withDrive(action){
  if(!driveConfigurato()){ avvisoConfig(); return; }
  if(!window.google || !google.accounts || !google.accounts.oauth2){ toast("Google non ancora caricato, riprova.", true); return; }
  if(!driveClient){
    driveClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: "https://www.googleapis.com/auth/drive.file",
      callback: ()=>{}
    });
  }
  if(driveToken && Date.now() < driveExp - 60000){ action(); return; }
  driveClient.callback = (resp)=>{
    if(resp.error){ toast("Accesso a Drive negato.", true); return; }
    driveToken = resp.access_token;
    driveExp = Date.now() + (resp.expires_in||3600)*1000;
    driveOn = true; renderToolbar();
    action();
  };
  driveClient.requestAccessToken({prompt: driveToken ? "" : "consent"});
}

async function driveFetch(url, opts){
  const o = opts || {};
  o.headers = Object.assign({Authorization:"Bearer "+driveToken}, o.headers||{});
  const r = await fetch(url, o);
  if(r.status===401){ driveToken=null; throw new Error("Sessione scaduta, riprova."); }
  if(!r.ok) throw new Error("Errore Drive ("+r.status+")");
  return r;
}

async function driveGetFolderId(){
  const q = encodeURIComponent(`name='${DRIVE_FOLDER}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const r = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`);
  const d = await r.json();
  if(d.files && d.files.length) return d.files[0].id;
  const r2 = await driveFetch("https://www.googleapis.com/drive/v3/files", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({name:DRIVE_FOLDER, mimeType:"application/vnd.google-apps.folder"})
  });
  return (await r2.json()).id;
}

async function driveFindFile(folderId){
  const q = encodeURIComponent(`name='${DRIVE_FILE}' and '${folderId}' in parents and trashed=false`);
  const r = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`);
  const d = await r.json();
  return (d.files && d.files[0]) ? d.files[0].id : null;
}

function driveSave(silent){
  withDrive(async ()=>{
    try{
      if(!corsi.length){ if(!silent) toast("Nessun corso da salvare.", true); return; }
      if(!silent) toast("Salvataggio su Drive…");
      const folderId = await driveGetFolderId();
      const fileId = await driveFindFile(folderId);
      const meta = fileId ? {} : {name:DRIVE_FILE, parents:[folderId]};
      const boundary = "lezbound" + Date.now();
      const body =
        `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n` +
        JSON.stringify(meta) +
        `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n` +
        JSON.stringify({corsi}, null, 2) +
        `\r\n--${boundary}--`;
      const url = fileId
        ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`
        : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
      await driveFetch(url, {method: fileId?"PATCH":"POST", headers:{"Content-Type":`multipart/related; boundary=${boundary}`}, body});
      toast(silent ? "🔄 Sincronizzato su Drive ✓" : `Salvato su Drive · cartella "${DRIVE_FOLDER}" ✓`);
    }catch(err){ toast(err.message||"Errore nel salvataggio su Drive.", true); }
  });
}

function driveLoad(){
  withDrive(async ()=>{
    try{
      toast("Lettura da Drive…");
      const folderId = await driveGetFolderId();
      const fileId = await driveFindFile(folderId);
      if(!fileId){ toast(`Nessun backup trovato nella cartella "${DRIVE_FOLDER}".`, true); return; }
      const r = await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
      applyImported(await r.json(), "su Drive");
    }catch(err){ toast(err.message||"Errore nella lettura da Drive.", true); }
  });
}

/* ──────────────── PREFERENZE (tema, testo) ──────────────── */
function loadPref(){
  try{ const p = JSON.parse(localStorage.getItem(PREF_KEY)); if(p) pref = Object.assign(pref, p); }catch(e){}
  applyPref();
}
function applyPref(){
  document.documentElement.dataset.theme = pref.theme;
  document.documentElement.style.setProperty("--scale", pref.scale);
}
function savePref(){ localStorage.setItem(PREF_KEY, JSON.stringify(pref)); }
function toggleTheme(){ pref.theme = pref.theme==="dark" ? "light" : "dark"; applyPref(); savePref(); renderToolbar(); }
function setScale(d){
  pref.scale = Math.min(1.5, Math.max(0.8, Math.round((pref.scale+d)*100)/100));
  applyPref(); savePref();
  toast("Dimensione testo: "+Math.round(pref.scale*100)+"%");
}

/* ──────────────── PWA / INSTALLAZIONE ──────────────── */
let deferredInstall = null;
window.addEventListener("beforeinstallprompt", e=>{ e.preventDefault(); deferredInstall=e; renderToolbar(); });
function installApp(){ if(deferredInstall){ deferredInstall.prompt(); deferredInstall=null; renderToolbar(); } }
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}

/* ── Barra strumenti (dinamica in base allo stato Drive) ── */
function renderToolbar(){
  const tb = document.getElementById("toolbar");
  const drive = driveOn
    ? `<span class="drivechip">☁️ Drive</span>
       <button class="btn btn-ghost btn-sm" id="btnDriveSave">☁️ Salva</button>
       <button class="btn btn-ghost btn-sm" id="btnDriveLoad">☁️ Carica</button>
       <button class="btn ${pref.autoSync?'btn-primary':'btn-ghost'} btn-sm" id="btnAuto" title="Salvataggio automatico su Drive">🔄 ${pref.autoSync?'Auto ON':'Auto'}</button>`
    : `<button class="btn btn-ghost btn-sm" id="btnDriveConnect">☁️ Collega Drive</button>`;
  const install = deferredInstall ? `<button class="btn btn-ghost btn-sm iconbtn" id="btnInstall" title="Installa app">📲</button>` : "";
  tb.innerHTML =
    `<button class="btn btn-ghost btn-sm iconbtn" id="btnTheme" title="Tema chiaro/scuro">${pref.theme==='dark'?'☀️':'🌙'}</button>
     <button class="btn btn-ghost btn-sm iconbtn" id="btnAm" title="Testo più piccolo">A−</button>
     <button class="btn btn-ghost btn-sm iconbtn" id="btnAp" title="Testo più grande">A+</button>`
    + drive + install +
    `<button class="btn btn-ghost btn-sm iconbtn" id="btnExport" title="Backup su file">⬇️</button>
     <button class="btn btn-ghost btn-sm iconbtn" id="btnImport" title="Ripristina da file">⬆️</button>
     <button class="btn btn-primary btn-sm" id="btnNew">＋ Nuovo corso</button>`;
  const on = (id, fn)=>{ const el=document.getElementById(id); if(el) el.onclick=fn; };
  on("btnTheme", toggleTheme);
  on("btnAm", ()=>setScale(-0.1));
  on("btnAp", ()=>setScale(0.1));
  on("btnDriveConnect", ()=> withDrive(()=>toast("Google Drive collegato ✓")));
  on("btnDriveSave", ()=>driveSave(false));
  on("btnDriveLoad", driveLoad);
  on("btnAuto", toggleAutoSync);
  on("btnInstall", installApp);
  on("btnExport", exportFile);
  on("btnImport", ()=> document.getElementById("fileBackup").click());
  on("btnNew", nuovoCorso);
}

/* ── Tastiera per le slide ── */
document.addEventListener("keydown", e=>{
  if(view!=="slide") return;
  if(e.target.isContentEditable || /INPUT|TEXTAREA/.test(e.target.tagName)) return;
  if(e.key==="ArrowRight") goTo(slideIndex+1);
  else if(e.key==="ArrowLeft") goTo(slideIndex-1);
  else if(e.key==="Escape"){ if(document.fullscreenElement) return; annulla(); }
  else if(e.key==="f" || e.key==="F") toggleFullscreen();
});

/* placeholder per contenteditable */
const ph = document.createElement("style");
ph.textContent = `[contenteditable].is-empty:before{content:attr(data-ph);opacity:.45;font-weight:600}`;
document.head.appendChild(ph);

/* ── Avvio ── */
loadPref();
load();
renderToolbar();
render();
